<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量王 PK 数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./data.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #11110f;
            --surface: #181713;
            --surface-2: #201f1a;
            --line: rgba(244, 240, 232, 0.13);
            --line-soft: rgba(244, 240, 232, 0.07);
            --text: #f4f0e8;
            --muted: #a8a29a;
            --faint: rgba(168, 162, 154, 0.72);
            --lime: #e6c75f;
            --pink: #e45a68;
            --red: #ff2d55;
            --blue: #5ac8fa;
            --red-soft: rgba(255, 45, 85, 0.22);
            --blue-soft: rgba(90, 200, 250, 0.2);
            --content: 1260px;
            --red-share: 50%;
            --hero-shelf-height: 196px;
            --hero-cover-overlap: 48px;
            --hero-image-tail-height: calc(var(--hero-shelf-height) - var(--hero-cover-overlap));
        }

        * { box-sizing: border-box; }

        html, body { min-height: 100%; }

        body {
            margin: 0;
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                linear-gradient(180deg, #141310 0%, var(--bg) 42%, #0c0b09 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }

        .page {
            min-height: 100vh;
            padding: 106px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar,
        .analysis-grid,
        .footer {
            width: min(var(--content), 100%);
            margin: 0 auto;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            width: 100%;
            margin: 0;
            min-height: 74px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            border: 1px solid var(--line);
            border-width: 0 0 1px;
            border-radius: 0;
            background: rgba(24, 23, 19, 0.78);
            backdrop-filter: blur(18px);
            padding: 9px max(16px, calc((100vw - var(--content)) / 2 + 16px));
        }

        .top-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--faint);
            font-size: 12px;
            white-space: nowrap;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .icon-action {
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.11);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.045);
            color: rgba(244, 240, 232, 0.78);
            padding: 0;
            cursor: pointer;
            transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
        }

        .icon-action:hover,
        .icon-action.is-done {
            color: var(--lime);
            border-color: rgba(230, 199, 95, 0.36);
            background: rgba(230, 199, 95, 0.1);
        }

        .icon-action:disabled {
            cursor: progress;
            opacity: 0.62;
        }

        .icon-action.is-error {
            color: var(--pink);
            border-color: rgba(228, 90, 104, 0.38);
            background: rgba(228, 90, 104, 0.1);
        }

        .icon-action svg {
            width: 15px;
            height: 15px;
            stroke-width: 2.2;
        }

        .live-qr-link {
            min-height: 56px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding-left: 14px;
            border-left: 1px solid var(--line);
            color: var(--text);
            outline: none;
            transition: color 160ms ease, border-color 160ms ease;
        }

        .live-qr-link:hover,
        .live-qr-link:focus-visible {
            border-left-color: rgba(230, 199, 95, 0.4);
        }

        .live-qr-link:focus-visible {
            border-radius: 6px;
            box-shadow: 0 0 0 2px rgba(230, 199, 95, 0.38);
        }

        .live-qr-copy {
            display: grid;
            justify-items: end;
            gap: 4px;
            color: var(--faint);
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .live-qr-copy strong {
            color: var(--text);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0;
            transition: color 160ms ease;
        }

        .live-qr-link:hover .live-qr-copy strong,
        .live-qr-link:focus-visible .live-qr-copy strong {
            color: var(--lime);
        }

        .live-qr-code {
            width: 56px;
            height: 56px;
            flex: 0 0 56px;
            padding: 3px;
            border-radius: 6px;
            background: #fff;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
        }

        .live-qr-code img {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hero-area {
            width: 100%;
            padding: 0;
        }

        .hero-band {
            position: relative;
            width: min(var(--content), 100%);
            aspect-ratio: 32 / 12.6;
            min-height: 450px;
            max-height: 520px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 8px;
            isolation: isolate;
        }

        .hero-band::before,
        .hero-band::after {
            content: "";
            position: absolute;
            pointer-events: none;
        }

        .hero-band::before {
            inset: 0;
            z-index: 2;
            background:
                linear-gradient(180deg,
                    rgba(17, 17, 15, 0) 0%,
                    rgba(17, 17, 15, 0) 22%,
                    rgba(17, 17, 15, 0.34) 35%,
                    rgba(17, 17, 15, 0.8) 58%,
                    rgba(17, 17, 15, 0.96) 76%,
                    rgba(17, 17, 15, 1) 100%);
            box-shadow: inset 0 0 64px 36px rgba(17, 17, 15, 0.6);
        }

        .hero-band::after {
            top: -10%;
            bottom: -10%;
            left: 50%;
            width: 17%;
            z-index: 3;
            transform: translateX(-50%);
            background: rgba(17, 17, 15, 0.56);
            filter: blur(28px);
        }

        .cover-layer {
            position: absolute;
            top: 0;
            right: 0;
            bottom: var(--hero-image-tail-height);
            left: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            z-index: 0;
        }

        .cover-cell {
            position: relative;
            overflow: hidden;
            background: #11100d;
        }

        .cover-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center bottom;
            filter: saturate(1.08) contrast(1.04) brightness(0.84);
            transform-origin: center bottom;
        }

        .cover-cell::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .cover-cell.red::after {
            background:
                linear-gradient(90deg, rgba(255, 45, 85, 0.34), rgba(17, 17, 15, 0.16) 44%, rgba(17, 17, 15, 0.82));
        }

        .cover-cell.blue::after {
            background:
                linear-gradient(270deg, rgba(90, 200, 250, 0.32), rgba(17, 17, 15, 0.16) 44%, rgba(17, 17, 15, 0.82));
        }

        .cover-blur-layer {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            z-index: 1;
            background: #11100d;
            clip-path: inset(calc(100% - var(--hero-image-tail-height)) 0 0 0);
        }

        .cover-blur-cell {
            position: relative;
            overflow: visible;
        }

        .cover-blur-cell img {
            position: absolute;
            top: auto;
            bottom: var(--hero-image-tail-height);
            left: 0;
            width: 100%;
            height: calc(100% - var(--hero-image-tail-height));
            object-fit: cover;
            object-position: center bottom;
            filter: saturate(1.08) contrast(1.04) brightness(0.84);
            transform: scaleY(-1);
            transform-origin: center bottom;
        }

        .cover-blur-cell.red img {
            left: 0;
            width: 100%;
        }

        .cover-blur-cell.blue img {
            right: auto;
            width: 100%;
        }

        .cover-blur-cell::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .cover-blur-cell.red::after {
            background:
                linear-gradient(90deg, rgba(255, 45, 85, 0.34), rgba(17, 17, 15, 0.16) 44%, rgba(17, 17, 15, 0.82));
        }

        .cover-blur-cell.blue::after {
            background:
                linear-gradient(270deg, rgba(90, 200, 250, 0.32), rgba(17, 17, 15, 0.16) 44%, rgba(17, 17, 15, 0.82));
        }

        .hero-content {
            position: absolute;
            inset: 0;
            z-index: 4;
            height: 100%;
            padding: 18px 24px 0;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 12px;
        }

        .hero-info-shelf {
            grid-row: 3;
            align-self: end;
            min-height: var(--hero-shelf-height);
            margin: 0 -24px;
            padding: 14px 24px 18px;
            display: grid;
            align-content: center;
            gap: 10px;
            position: relative;
            border-top: 0;
            background: transparent;
            box-shadow: none;
        }

        .hero-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            align-items: center;
            gap: 18px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: end;
            gap: 16px;
        }

        .pk-action-row {
            position: relative;
            display: block;
            min-height: 66px;
            padding-bottom: 0;
        }

        .avatar-stack {
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .pk-action-row .avatar-stack {
            position: absolute;
            top: 24px;
            z-index: 5;
            pointer-events: none;
        }

        .pk-action-row .avatar-stack.red {
            left: 0;
        }

        .pk-action-row .avatar-stack.blue {
            right: 0;
        }

        .avatar-stack.right { justify-content: flex-end; }

        .avatar-chip {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.72);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.34);
        }

        .avatar-chip + .avatar-chip { margin-left: -10px; }
        .avatar-stack.red .avatar-chip { border-color: rgba(255, 45, 85, 0.82); }
        .avatar-stack.blue .avatar-chip { border-color: rgba(90, 200, 250, 0.82); }

        .scoreboard {
            align-self: center;
            margin-bottom: calc(var(--hero-cover-overlap) * -0.35);
            transform: translateY(calc(var(--hero-cover-overlap) * -0.58));
        }

        .score-side {
            min-width: 0;
            display: grid;
            align-content: end;
        }

        .score-side.right {
            text-align: right;
        }

        .score-number {
            color: #fff;
            font: 800 clamp(38px, 5vw, 68px)/0.92 "Rubik", "Noto Sans SC", sans-serif;
            white-space: nowrap;
            letter-spacing: 0;
            display: inline-flex;
            align-items: baseline;
            flex-wrap: nowrap;
            width: max-content;
            perspective: 720px;
        }

        .score-char {
            min-width: 0.54em;
            display: inline-block;
            text-align: center;
            transform-origin: 50% 50%;
        }

        .score-char.unit,
        .score-char.punct {
            min-width: auto;
        }

        .score-char.flip {
            animation: scoreFlip 560ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes scoreFlip {
            0% {
                transform: rotateX(0deg);
                filter: brightness(1);
            }
            45% {
                transform: rotateX(-88deg);
                filter: brightness(0.72);
            }
            55% {
                transform: rotateX(76deg);
                filter: brightness(1.2);
            }
            100% {
                transform: rotateX(0deg);
                filter: brightness(1);
            }
        }

        .score-number.red {
            color: #fff;
            text-shadow:
                0 0 34px rgba(255, 45, 85, 0.42),
                0 2px 0 rgba(255, 45, 85, 0.52);
        }

        .score-number.blue {
            color: #fff;
            text-shadow:
                0 0 34px rgba(90, 200, 250, 0.42),
                0 2px 0 rgba(90, 200, 250, 0.5);
        }

        .score-side.right .score-number {
            justify-self: end;
        }

        .title-lockup {
            display: grid;
            align-self: end;
            justify-items: center;
            gap: 8px;
            text-align: center;
        }

        .title-lockup h1 {
            margin: 0;
            display: inline-grid;
            grid-template-columns: auto auto auto;
            align-items: center;
            gap: 8px;
            font-size: clamp(22px, 2.45vw, 36px);
            line-height: 0.98;
            font-weight: 900;
            white-space: nowrap;
            letter-spacing: 0;
        }

        .diff-chip {
            height: 28px;
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 6px;
            background: rgba(24, 23, 19, 0.66);
            color: var(--lime);
            padding: 0 10px;
            font: 700 12px/1 "Rubik", "Noto Sans SC", sans-serif;
            backdrop-filter: blur(12px);
        }

        .pk-block {
            position: relative;
            z-index: 1;
            width: 100%;
            min-width: 0;
            padding: 0;
        }

        .pk-head {
            position: relative;
            height: 26px;
            display: block;
            color: rgba(255, 255, 255, 0.74);
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 7px;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
        }

        .pk-head .diff-chip {
            position: absolute;
            top: 50%;
            left: var(--red-share);
            transform: translate(-50%, -50%);
            white-space: nowrap;
            z-index: 4;
        }

        .pk-percent {
            position: absolute;
            top: 50%;
            z-index: 3;
            color: #fff;
            font: 800 13px/1 "Rubik", sans-serif;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.75);
            white-space: nowrap;
            pointer-events: none;
        }

        .pk-percent.red {
            left: calc(var(--red-share) - 10px);
            transform: translate(-100%, -50%);
        }

        .pk-percent.blue {
            left: calc(var(--red-share) + 10px);
            transform: translateY(-50%);
        }

        .pk-head span {
            color: #fff;
            letter-spacing: 0;
        }

        .pk-track {
            position: relative;
            height: 28px;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-left-color: transparent;
            border-right-color: transparent;
            background:
                linear-gradient(90deg,
                    rgba(255, 45, 85, 0) 0%,
                    rgba(255, 45, 85, 0.18) 7%,
                    rgba(255, 45, 85, 0.46) calc(var(--red-share) - 1px),
                    rgba(90, 200, 250, 0.46) calc(var(--red-share) + 1px),
                    rgba(90, 200, 250, 0.18) 93%,
                    rgba(90, 200, 250, 0) 100%);
            backdrop-filter: blur(6px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 24px rgba(255, 45, 85, 0.09),
                0 0 24px rgba(90, 200, 250, 0.09),
                0 16px 40px rgba(0, 0, 0, 0.34);
        }

        .pk-tick {
            position: absolute;
            top: 0;
            bottom: 0;
            left: var(--red-share);
            width: 4px;
            z-index: 2;
            transform: translateX(-50%);
            border-radius: 4px;
            background: rgba(220, 224, 230, 0.82);
            box-shadow:
                0 0 10px rgba(220, 224, 230, 0.36);
        }

        .watch-link {
            height: 32px;
            min-width: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border-radius: 6px;
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            padding: 0;
            backdrop-filter: none;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.72);
        }

        .watch-link svg {
            width: 14px;
            height: 14px;
            stroke-width: 2.4;
        }

        .watch-link.red {
            justify-self: start;
            color: #fff;
        }

        .watch-link.blue {
            justify-self: end;
            color: #fff;
        }

        .watch-link.red svg { color: var(--red); }
        .watch-link.blue svg { color: var(--blue); }

        .watch-link.red:hover {
            color: var(--red);
        }

        .watch-link.blue:hover {
            color: var(--blue);
        }

        .analysis-grid {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            min-height: 390px;
        }

        .panel {
            min-height: 390px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(24, 23, 19, 0.82);
            padding: 16px;
        }

        .panel-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .panel-title {
            display: grid;
            gap: 5px;
        }

        .panel-title h2 {
            margin: 0;
            font-size: 16px;
            line-height: 1;
        }

        .chart {
            flex: 1;
            min-height: 260px;
        }

        .metric-chart {
            flex: 1;
            min-height: 300px;
            display: grid;
            grid-template-rows: repeat(6, minmax(40px, 1fr));
            gap: 8px;
            padding-top: 2px;
        }

        .metric-row {
            display: grid;
            grid-template-columns: 76px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            min-height: 40px;
        }

        .metric-label {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(244, 240, 232, 0.84);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .metric-icon {
            width: 32px;
            height: 32px;
            flex: 0 0 32px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.09);
            background: rgba(255, 255, 255, 0.035);
            color: rgba(230, 199, 95, 0.9);
        }

        .metric-icon svg {
            width: 18px;
            height: 18px;
            stroke-width: 1.8;
        }

        .metric-bars {
            display: grid;
            gap: 5px;
            min-width: 0;
        }

        .metric-bar-line {
            --pct: 0%;
            position: relative;
            height: 18px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.045);
            overflow: visible;
        }

        .metric-fill {
            width: var(--pct);
            height: 100%;
            min-width: 26px;
            border-radius: 6px;
            position: relative;
        }

        .metric-fill.red {
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.32), var(--red));
            box-shadow: 0 0 18px rgba(255, 45, 85, 0.18);
        }

        .metric-fill.blue {
            background: linear-gradient(90deg, rgba(90, 200, 250, 0.28), var(--blue));
            box-shadow: 0 0 18px rgba(90, 200, 250, 0.16);
        }

        .metric-tip {
            position: absolute;
            top: 50%;
            left: min(var(--pct), calc(100% - 72px));
            transform: translate(8px, -50%);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font: 700 11px/1 "Rubik", "Noto Sans SC", sans-serif;
            white-space: nowrap;
            pointer-events: none;
        }

        .metric-tip img {
            width: 19px;
            height: 19px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.74);
            background: var(--surface-2);
        }

        .metric-bar-line.red-line .metric-tip img { border-color: var(--red); }
        .metric-bar-line.blue-line .metric-tip img { border-color: var(--blue); }

        @media (max-width: 980px) {
            .page { padding: 14px; }
            .hero-band {
                --hero-shelf-height: 190px;
                --hero-cover-overlap: 40px;
                min-height: 450px;
                aspect-ratio: auto;
            }
            .hero-content {
                padding: 18px 18px 0;
            }
            .hero-info-shelf {
                margin: 0 -18px;
                padding: 13px 18px 16px;
            }
            .scoreboard {
                grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
                align-items: end;
                gap: 14px;
                text-align: left;
            }
            .pk-action-row {
                display: block;
                min-height: 64px;
                padding-bottom: 0;
            }
            .pk-action-row .avatar-stack {
                top: 23px;
            }
            .score-side.right {
                text-align: right;
            }
            .title-lockup {
                justify-items: center;
                text-align: center;
            }
            .title-lockup h1 {
                font-size: clamp(20px, 3.2vw, 30px);
                white-space: nowrap;
            }
            .score-number {
                font-size: clamp(34px, 5.8vw, 56px);
            }
            .pk-block {
                width: 100%;
                min-width: 0;
                order: 0;
            }
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 72px 8px 8px;
                gap: 8px;

    <script>
        const DATA_URL = './data.jsonl';
        const BILI_API_URL = 'https://api.bilibili.com/x/web-interface/view?bvid=';
        const RED = '#ff2d55';
        const BLUE = '#5ac8fa';
        const GITHUB_URL = 'https://github.com/kingOfSoySauce/bilibili-pk-tracker';
        const VIDEO_CONFIG = {
            red: { label: '红队', team: '大虾队', bvid: 'BV1zgTn6rEsh' },
            blue: { label: '蓝队', team: '雨哥队', bvid: 'BV1UUTJ6dErS' }
        };
        let viewChart;
        let historySnapshots = [];
        let lastRealtimeOk = false;

        function normalizeSnapshots(snapshots) {
            const byKey = new Map();
            (snapshots || []).forEach(snapshot => {
                if (!snapshot || !snapshot.time || !snapshot.videos) return;
                const key = `${snapshot.ts || ''}|${snapshot.time}`;
                byKey.set(key, snapshot);
            });
            return Array.from(byKey.values()).sort((a, b) => {
                const aTs = Number(a.ts) || new Date(a.time).getTime() / 1000 || 0;
                const bTs = Number(b.ts) || new Date(b.time).getTime() / 1000 || 0;
                return aTs - bTs || String(a.time).localeCompare(String(b.time));
            });
        }

        function parseJsonlHistory(text) {
            const snapshots = text
                .split(/\r?\n/)
                .map(line => line.trim())
                .filter(Boolean)
                .map(line => JSON.parse(line));
            return { snapshots: normalizeSnapshots(snapshots) };
        }

        function getBundledHistoryData() {
            const snapshots = window.BILI_PK_DATA && Array.isArray(window.BILI_PK_DATA.snapshots)
                ? normalizeSnapshots(window.BILI_PK_DATA.snapshots)
                : [];
            return snapshots.length ? { snapshots } : null;
        }

        function fmt(n) {
            if (n == null || Number.isNaN(n)) return '--';
            if (Math.abs(n) >= 10000) return (n / 10000).toFixed(1) + '万';
            return n.toLocaleString('zh-CN');
        }

        function fmtSigned(n) {
            if (n == null || Number.isNaN(n)) return '--';
            return (n > 0 ? '+' : '') + fmt(n);
        }

        function fmtWanInteger(n) {
            if (n == null || Number.isNaN(n)) return '--';
            if (Math.abs(n) >= 10000) return Math.round(n / 10000) + ' 万';
            return n.toLocaleString('zh-CN');
        }

        function fmtTime(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '--';
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function fmtDateTime(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '--';
            return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function pct(part, total) {
            if (!total) return 50;
            return Math.max(0, Math.min(100, part / total * 100));
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.textContent = value;
        }

        function setFlipText(id, value) {
            const el = document.getElementById(id);
            if (!el) return;

            const text = String(value);
            const previous = el.dataset.prevText || '';
            const animate = Boolean(previous && previous !== text);
            const previousChars = Array.from(previous);

            el.replaceChildren(...Array.from(text).map((char, index) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.className = 'score-char';
                if (/[\u4e00-\u9fff]/.test(char)) span.classList.add('unit');
                if (/[.,，]/.test(char)) span.classList.add('punct');
                if (animate && previousChars[index] !== char) span.classList.add('flip');
                return span;
            }));

            el.dataset.prevText = text;
        }

        function flashAction(button) {
            if (!button) return;
            button.classList.add('is-done');
            window.setTimeout(() => button.classList.remove('is-done'), 1100);
        }

        function markActionError(button, message) {
            if (!button) return;
            const originalTitle = button.getAttribute('title');
            button.classList.add('is-error');
            button.setAttribute('title', message);
            window.setTimeout(() => {
                button.classList.remove('is-error');
                if (originalTitle) button.setAttribute('title', originalTitle);
            }, 1600);
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function screenshotFilename() {
            const now = new Date();
            const stamp = [
                now.getFullYear(),
                String(now.getMonth() + 1).padStart(2, '0'),
                String(now.getDate()).padStart(2, '0'),
                String(now.getHours()).padStart(2, '0'),
                String(now.getMinutes()).padStart(2, '0')
            ].join('');
            return `bilibili-pk-dashboard-${stamp}.png`;
        }

        async function saveFullPageImage() {
            const button = document.getElementById('copyImageBtn');
            try {
                if (!window.html2canvas) throw new Error('html2canvas unavailable');
                if (button) button.disabled = true;

                const captureTarget = document.querySelector('.page');
                if (!captureTarget) throw new Error('page element missing');
                const viewportWidth = window.innerWidth || document.documentElement.clientWidth;
                const viewportHeight = window.innerHeight || document.documentElement.clientHeight;

                const canvas = await window.html2canvas(captureTarget, {
                    backgroundColor: '#11110f',
                    width: captureTarget.scrollWidth,
                    height: captureTarget.scrollHeight,
                    windowWidth: viewportWidth,
                    windowHeight: viewportHeight,
                    scrollX: 0,
                    scrollY: 0,
                    scale: Math.min(window.devicePixelRatio || 1, 2),
                    useCORS: true,
                    onclone: clonedDoc => {
                        const clonedButton = clonedDoc.getElementById('copyImageBtn');
                        if (clonedButton) clonedButton.disabled = false;
                        const clonedTopbar = clonedDoc.querySelector('.topbar');
                        if (clonedTopbar) {
                            clonedTopbar.style.position = 'absolute';
                            clonedTopbar.style.top = '0';
                            clonedTopbar.style.left = '0';
                            clonedTopbar.style.right = '0';
                            clonedTopbar.style.width = '100%';
                        }
                    }
                });
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                if (!blob) throw new Error('image render failed');

                downloadBlob(blob, screenshotFilename());
                flashAction(button);
            } catch (error) {
                console.warn('save image failed', error);
                markActionError(button, '保存失败，请用本地服务或 HTTPS 打开');
            } finally {
                if (button) button.disabled = false;
            }
        }

        async function sharePage() {
            const button = document.getElementById('sharePageBtn');
            const payload = {
                title: document.title,
                text: '流量王 PK 数据看板',
                url: window.location.href || GITHUB_URL
            };

            try {
                if (navigator.share) {
                    await navigator.share(payload);
                } else if (navigator.clipboard) {
                    await navigator.clipboard.writeText(payload.url);
                }
                flashAction(button);
            } catch (error) {
                if (error && error.name !== 'AbortError') {
                    console.warn('share failed', error);
                    markActionError(button, '分享失败，请复制地址');
                }
            }
        }

        function initActions() {
            const copyButton = document.getElementById('copyImageBtn');
            const shareButton = document.getElementById('sharePageBtn');
            if (copyButton) copyButton.addEventListener('click', saveFullPageImage);
            if (shareButton) shareButton.addEventListener('click', sharePage);
            if (window.lucide) window.lucide.createIcons();
        }

        function normalizeBiliVideo(video) {
            const stat = video.stat || {};
            return {
                title: video.title,
                up: video.owner?.name || '',
                view: stat.view || 0,
                like: stat.like || 0,
                coin: stat.coin || 0,
                favorite: stat.favorite || 0,
                share: stat.share || 0,
                danmaku: stat.danmaku || 0,
                reply: stat.reply || 0,
                pubdate: video.pubdate,
                duration: video.duration
            };
        }

        async function fetchBiliVideoCors(bvid) {
            const response = await fetch(BILI_API_URL + encodeURIComponent(bvid) + '&t=' + Date.now(), {
                cache: 'no-store',
                credentials: 'omit',
                mode: 'cors'
            });
            if (!response.ok) throw new Error(`Bilibili API HTTP ${response.status}`);
            const result = await response.json();
            if (result.code !== 0) throw new Error(result.message || 'Bilibili API error');
            return normalizeBiliVideo(result.data || {});
        }

        function fetchBiliVideoJsonp(bvid) {
            return new Promise((resolve, reject) => {
                const callbackName = `__biliPkCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const script = document.createElement('script');
                const cleanup = () => {
                    delete window[callbackName];
                    script.remove();
                };
                const timeout = window.setTimeout(() => {
                    cleanup();
                    reject(new Error('Bilibili JSONP timeout'));
                }, 12000);

                window[callbackName] = result => {
                    window.clearTimeout(timeout);
                    cleanup();
                    if (!result || result.code !== 0) {
                        reject(new Error(result?.message || 'Bilibili JSONP error'));
                        return;
                    }
                    resolve(normalizeBiliVideo(result.data || {}));
                };

                script.onerror = () => {
                    window.clearTimeout(timeout);
                    cleanup();
                    reject(new Error('Bilibili JSONP script failed'));
                };
                script.src = `${BILI_API_URL}${encodeURIComponent(bvid)}&jsonp=jsonp&callback=${callbackName}&t=${Date.now()}`;
                document.head.appendChild(script);
            });
        }

        async function fetchBiliVideo(bvid) {
            try {
                return await fetchBiliVideoCors(bvid);
            } catch (error) {
                console.warn('Bilibili CORS fetch failed, retrying with JSONP', error);
                return fetchBiliVideoJsonp(bvid);
            }
        }

        function buildRealtimeSnapshot(redVideo, blueVideo) {
            const now = new Date();
            return {
                ts: Math.floor(now.getTime() / 1000),
                time: now.toISOString(),
                videos: {
                    [VIDEO_CONFIG.red.label]: redVideo,
                    [VIDEO_CONFIG.blue.label]: blueVideo
                }
            };
        }

        function renderLatestSnapshot(snapshot, options = {}) {
            if (!snapshot) return;

            const redLatest = snapshot.videos?.[VIDEO_CONFIG.red.label] || {};
            const blueLatest = snapshot.videos?.[VIDEO_CONFIG.blue.label] || {};

            const redViews = redLatest.view || 0;
            const blueViews = blueLatest.view || 0;
            const totalViews = redViews + blueViews;
            const redShare = pct(redViews, totalViews);
            const blueShare = 100 - redShare;
            const diff = redViews - blueViews;
            const leader = diff >= 0 ? VIDEO_CONFIG.red.team : VIDEO_CONFIG.blue.team;

            document.documentElement.style.setProperty('--red-share', redShare.toFixed(2) + '%');
            setText('topTime', `${fmtDateTime(snapshot.time)} ${options.realtime ? '实时更新' : '更新'}`);
            setFlipText('redViews', fmt(redViews));
            setFlipText('blueViews', fmt(blueViews));
            setText('viewDiff', `${leader}领先 ${fmtWanInteger(Math.abs(diff))}`);
            setText('redShareLabel', `${redShare.toFixed(1)}%`);
            setText('blueShareLabel', `${blueShare.toFixed(1)}%`);
            renderEngagementChart(redLatest, blueLatest);
        }

        function renderHistoryChart(snaps) {
            if (!snaps.length) return;
            const times = snaps.map(s => fmtDateTime(s.time));
            const redSeries = snaps.map(s => (s.videos?.[VIDEO_CONFIG.red.label] || {}).view || 0);
            const blueSeries = snaps.map(s => (s.videos?.[VIDEO_CONFIG.blue.label] || {}).view || 0);
            renderViewChart(times, redSeries, blueSeries);
        }

        async function loadHistoryData(options = {}) {
            let data;
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error(`data.jsonl HTTP ${response.status}`);
                data = parseJsonlHistory(await response.text());
            } catch (error) {
                data = getBundledHistoryData();
                if (!data) {
                    setText('topTime', '数据加载失败');
                    return;
                }
            }

            const snaps = data.snapshots || [];
            if (!snaps.length) return;

            historySnapshots = snaps;
            renderHistoryChart(historySnapshots);

            if (options.updateLatest || !lastRealtimeOk) {
                renderLatestSnapshot(historySnapshots[historySnapshots.length - 1]);
            }
        }

        async function loadRealtimeData() {
            try {
                const [redVideo, blueVideo] = await Promise.all([
                    fetchBiliVideo(VIDEO_CONFIG.red.bvid),
                    fetchBiliVideo(VIDEO_CONFIG.blue.bvid)
                ]);
                lastRealtimeOk = true;
                renderLatestSnapshot(buildRealtimeSnapshot(redVideo, blueVideo), { realtime: true });
            } catch (error) {
                lastRealtimeOk = false;
                console.warn('realtime fetch failed, keeping historical data', error);
                if (historySnapshots.length) {
                    renderLatestSnapshot(historySnapshots[historySnapshots.length - 1]);
                }
            }
        }

        async function bootstrapData() {
            await loadHistoryData({ updateLatest: true });
            await loadRealtimeData();
        }

        function renderViewChart(times, redSeries, blueSeries) {
            const el = document.getElementById('viewChart');
            if (!viewChart) viewChart = echarts.init(el);
            const lastIndex = Math.max(0, times.length - 1);

            viewChart.setOption({
                animationDuration: 520,
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(17, 17, 15, 0.96)',
                    borderColor: 'rgba(255,255,255,0.12)',
                    textStyle: { color: '#f4f0e8', fontFamily: 'Noto Sans SC' },
                    formatter: params => {
                        const rows = params.map(p => `${p.marker}${p.seriesName} <b style="float:right;margin-left:18px">${fmt(p.value)}</b>`).join('<br>');
                        return `<strong>${params[0].axisValue}</strong><br>${rows}`;
                    }
                },
                grid: { left: 54, right: 70, top: 14, bottom: 28 },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: times,
                    axisLabel: { color: 'rgba(168,162,154,0.72)', fontSize: 10, hideOverlap: true },
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.08)' } },
                    axisTick: { show: false }
                },
                yAxis: {
                    type: 'value',
                    min: 0,
                    scale: false,
                    splitNumber: 4,
                    axisLabel: { color: 'rgba(168,162,154,0.72)', fontSize: 10, formatter: value => fmt(value) },
                    axisLine: { show: false },
                    axisTick: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.055)' } }
                },
                series: [
                    {
                        name: '红方',
                        type: 'line',
                        data: redSeries,
                        smooth: true,
                        showSymbol: false,
                        lineStyle: { color: RED, width: 3 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(255,45,85,0.2)' },
                                { offset: 1, color: 'rgba(255,45,85,0)' }
                            ])
                        },
                        markPoint: {
                            symbol: 'image://assets/red-avatar.jpg',
                            symbolSize: 30,
                            symbolOffset: [18, 0],
                            label: { show: false },
                            data: [{ coord: [times[lastIndex], redSeries[lastIndex]] }]
                        }
                    },
                    {
                        name: '蓝方',
                        type: 'line',
                        data: blueSeries,
                        smooth: true,
                        showSymbol: false,
                        lineStyle: { color: BLUE, width: 3 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(90,200,250,0.2)' },
                                { offset: 1, color: 'rgba(90,200,250,0)' }
                            ])
                        },
                        markPoint: {
                            symbol: 'image://assets/blue-avatar.jpg',
                            symbolSize: 30,
                            symbolOffset: [18, 0],
                            label: { show: false },
                            data: [{ coord: [times[lastIndex], blueSeries[lastIndex]] }]
                        }
                    }
                ]
            });
        }

        function renderEngagementChart(redData, blueData) {
            const el = document.getElementById('engagementChart');
            const metrics = [
                { key: 'like', label: '点赞', icon: 'thumbs-up', red: redData.like || 0, blue: blueData.like || 0 },
                { key: 'favorite', label: '收藏', icon: 'star', red: redData.favorite || 0, blue: blueData.favorite || 0 },
                { key: 'share', label: '转发', icon: 'send', red: redData.share || 0, blue: blueData.share || 0 },
                { key: 'coin', label: '投币', icon: 'coins', red: redData.coin || 0, blue: blueData.coin || 0 },
                { key: 'danmaku', label: '弹幕', icon: 'message-square', red: redData.danmaku || 0, blue: blueData.danmaku || 0 },
                { key: 'reply', label: '评论', icon: 'message-circle', red: redData.reply || 0, blue: blueData.reply || 0 }
            ];
            const maxValue = Math.max(...metrics.flatMap(metric => [metric.red, metric.blue]), 1);

            el.innerHTML = metrics.map(metric => {
                const redPct = Math.max(8, metric.red / maxValue * 100);
                const bluePct = Math.max(8, metric.blue / maxValue * 100);
                return `
                    <div class="metric-row" aria-label="${metric.label}">
                        <div class="metric-label">
                            <span class="metric-icon" title="${metric.label}" aria-hidden="true">
                                <i data-lucide="${metric.icon}"></i>
                            </span>
                            <span>${metric.label}</span>
                        </div>
                        <div class="metric-bars">
                            ${metricBar('red', redPct, metric.red, 'assets/red-avatar.jpg')}
                            ${metricBar('blue', bluePct, metric.blue, 'assets/blue-avatar.jpg')}
                        </div>
                    </div>
                `;
            }).join('');

            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function metricBar(side, pctValue, value, avatar) {
            const cls = side === 'red' ? 'red-line' : 'blue-line';
            return `
                <div class="metric-bar-line ${cls}" style="--pct:${pctValue.toFixed(2)}%">
                    <div class="metric-fill ${side}"></div>
                    <div class="metric-tip">
                        <span>${fmt(value)}</span>
                        <img src="${avatar}" alt="">
                    </div>
                </div>
            `;
        }

        window.addEventListener('resize', () => {
            if (viewChart) viewChart.resize();
        });

        initActions();
        bootstrapData();
        setInterval(loadRealtimeData, 60 * 1000);
        setInterval(() => loadHistoryData({ updateLatest: !lastRealtimeOk }), 30 * 60 * 1000);
    </script>
</body>
</html>
